    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>

    <script src="https://assets.codepen.io/16327/SplitText3.min.js"></script>
    <script>
        gsap.registerPlugin(SplitText);

        // split elements with the class "split" into words and characters
        let split = SplitText.create(".split", { type: "words, chars" });

        // now animate the characters in a staggered fashion
        gsap.from(split.chars, {
            x: 150,
            opacity: 0,
            duration: 0.9,
            ease: "power4",
            stagger: 0.04
        });

        ///輪播-------------------------------------------------------------------------------
        gsap.registerPlugin(ScrollTrigger, ScrollSmoother);
const smoother = ScrollSmoother.create({
    wrapper: "#smooth-wrapper",
    content: "#smooth-content",
    smooth: 2,
    normalizeScroll: true,
    ignoreMobileResize: true,
    preventDefault: true
});

// 垂直輪播 Galleries
if (document.getElementById("portfolio")) {
    const verticalSections = gsap.utils.toArray(".vertical-gallery-wrapper");

    verticalSections.forEach(function (sec, i) {
        const pinWrap = sec.querySelector(".vertical-gallery-strip");

        let pinWrapHeight;
        let verticalScrollLength;

        function refresh() {
            pinWrapHeight = pinWrap.scrollHeight;
            verticalScrollLength = pinWrapHeight - window.innerHeight;
        }

        refresh();
        
        // Pinning 和垂直滾動
        gsap.to(pinWrap, {
            scrollTrigger: {
                scrub: true,
                trigger: sec,
                pin: sec,
                start: "top top",
                end: () => `+=${pinWrapHeight}`,
                invalidateOnRefresh: true
            },
            y: () => -verticalScrollLength,
            ease: "none"
        });

        ScrollTrigger.addEventListener("refreshInit", refresh);
    });
}
